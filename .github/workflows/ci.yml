name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (lockfile-verified)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      # Scraper regression stage (WP-0.2): adapter fixture suites only —
      # this stage must NEVER contact a live marketplace. Fixtures land in
      # Milestone 1 (WP-1.2/1.3); the stage is wired now.
      - name: Scraper fixture regression
        run: pnpm --filter @pricepulse/adapters test:fixtures

      - name: Build all packages
        run: pnpm build

      - name: Dependency audit (advisory in Phase 0)
        run: pnpm audit --audit-level high || true

  images:
    # Tagged commits publish runnable images (WP-0.2).
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          tags: ghcr.io/${{ github.repository }}-api:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.worker
          push: true
          tags: ghcr.io/${{ github.repository }}-worker:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
